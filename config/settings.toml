[system]
mode = "observe_only"
workspace_name = "electri-city-ops"
timezone = "Europe/Berlin"

[schedule]
cycle_interval_minutes = 60

[targets]
domains = [
  "electri-c-ity-studios-24-7.com"
]
user_agent = "ElectriCityOps/0.1 (+observe-only)"
request_timeout_seconds = 15
max_response_bytes = 1048576

[permissions]
allow_remote_fetch = true
allow_external_changes = false
allow_workspace_self_healing = true

[thresholds]
warning_response_ms = 1200
critical_response_ms = 3000
large_html_bytes = 250000

[notifications.email]
enabled = false
sender = ""
recipients = []
smtp_host = ""
smtp_port = 587
smtp_username = ""
smtp_password = ""
starttls = true
